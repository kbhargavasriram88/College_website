<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password | Smart Attendance</title>
  <link rel="stylesheet" href="forgot-password.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="forgot-container">
  <div class="icon-box">🔐</div>
  <h2>Reset Password</h2>
  <p class="sub">
    Confirm your account identity and institutional details to receive password recovery instructions.
  </p>

  <form id="forgotForm">
    <label>Access Identity (Roll / Username)</label>
    <input type="text" id="username" placeholder="Enter your ID" required>

    <label>Associated Email Address</label>
    <input type="email" id="email" placeholder="Enter your registered email" required>

    <button type="submit">Verify Identity</button>

    <a href="login.html" class="back-link">Return to Login</a>

    <div id="message"></div>
  </form>
</div>

<script src="api.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  const form = document.getElementById("forgotForm");
  const messageElement = document.getElementById("message");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    messageElement.textContent = "Verifying details...";
    messageElement.className = "";

    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();

    try {
      // Use the API helper for forgot password
      const response = await AttendanceApi.forgotPassword(username, email);
      messageElement.textContent = response.message;
      messageElement.className = "success";
      form.reset();
    } catch (error) {
      messageElement.textContent = error.message;
      messageElement.className = "error";
    }
  });
});
</script>

</body>
</html>
